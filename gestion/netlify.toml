[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/*"
  [headers.values]
    # Empêche la mise en iframe (clickjacking)
    X-Frame-Options = "DENY"
    # Empêche le navigateur de deviner le type MIME
    X-Content-Type-Options = "nosniff"
    # Force HTTPS
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    # Contrôle les infos de référent
    Referrer-Policy = "strict-origin-when-cross-origin"
    # Permissions navigateur (pas besoin de caméra, micro, géoloc)
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Politique de contenu — autorise Firebase, Google Fonts, et self
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.googleapis.com https://*.firebaseio.com https://firestore.googleapis.com https://identitytoolkit.googleapis.com wss://*.firebaseio.com; img-src 'self' data: blob:; worker-src 'self' blob:;"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
